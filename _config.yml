# Site
title: yluna的个人空间    # 浏览器标签页上显示的大标题
subtitle: '13.5 nm 极紫外光与生活随笔' # 网站副标题（可以写你的 EUV 研究或者你喜欢的一句话）
description: '记录学术、摄影与 ACG 爱好' # 网站描述
keywords: 'USTC, 物理, 摄影, 博客'
author: yluna            # 这里的名字会显示在文章底部和版权声明处
language: zh-CN
timezone: ''
url: http://example.com
permalink: ':year/:month/:day/:title/'
permalink_defaults: null
pretty_urls:
  trailing_index: true
  trailing_html: true
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: ':lang'
skip_render: null
new_post_name: ':title.md'
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
index_generator:
  path: ''
  per_page: 10
  order_by: '-date'
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page
include: null
exclude: null
ignore: null
theme: tangyuxian
# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/yluna-36/yluna-36.github.io.git
  branch: main  # 注意：现在 GitHub 默认分支通常是 main，如果是老仓库可能是 master

