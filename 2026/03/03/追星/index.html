      KEEP?.utils?.pjaxProgressBarEnd()

      window?.pjax?.executeScripts(
        document.querySelectorAll('script[data-pjax], .pjax script')
      )

      KEEP?.initExecute()
    }

    // DOM Ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPjax)
    } else {
      initPjax()
    }
  })()
